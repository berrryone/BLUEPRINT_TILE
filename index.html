<!doctype html>
<html lang="pl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint Engine v3.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        * { font-family: 'JetBrains Mono', monospace; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }

        .grid-background {
            background-color: #050505;
            background-image: 
                linear-gradient(#151515 1px, transparent 1px),
                linear-gradient(90deg, #151515 1px, transparent 1px),
                linear-gradient(#1a1a1a 1px, transparent 1px),
                linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
            background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
        }

        .tile {
            position: absolute; min-width: 200px; background: rgba(13, 13, 13, 0.95);
            border: 1px solid #333; border-radius: 4px; cursor: move; user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 10;
        }

        .tile-header { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; border-radius: 4px 4px 0 0; }
        .tile-title { background: transparent; border: none; color: #fff; font-size: 11px; font-weight: 700; flex: 1; outline: none; }
        
        .btn-header { background: transparent; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 14px; padding: 0 4px; }
        .btn-header:hover { color: #ff4d4d; }

        .tile-content { padding: 10px; }
        .tile-textarea { 
            width: 100%; background: #0a0a0a; border: 1px solid #222; color: #aaa; 
            font-size: 11px; padding: 8px; resize: none; outline: none; min-height: 60px;
        }

        .pin {
            width: 12px; height: 12px; border-radius: 50%; border: 2px solid;
            background: #0d0d0d; cursor: crosshair; position: absolute; z-index: 20;
        }
        .pin-input { left: -7px; top: 42px; border-color: #f1c40f; }
        .pin-output-container { position: absolute; right: -7px; top: 42px; display: flex; flex-direction: column; gap: 12px; }
        .pin-output { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #2ecc71; background: #0d0d0d; cursor: crosshair; }

        .toolbar {
            position: fixed; left: 0; top: 0; width: 180px; height: 100%;
            background: #0a0a0a; border-right: 1px solid #222; padding: 15px;
            display: flex; flex-direction: column; gap: 8px; z-index: 1000;
        }
        .toolbar-title { color: #666; font-size: 9px; text-transform: uppercase; margin-top: 10px; }
        .toolbar-btn {
            background: #151515; border: 1px solid #2a2a2a; color: #aaa;
            padding: 8px 10px; font-size: 11px; cursor: pointer; text-align: left; border-radius: 2px;
        }
        .toolbar-btn:hover { background: #222; color: #fff; }

        #canvas-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #canvas { position: absolute; width: 5000px; height: 5000px; transform-origin: 0 0; }
        
        .connection-line { fill: none; stroke: #fff; stroke-width: 3; cursor: pointer; }
        .connection-line:hover { stroke: #ff4d4d; }
        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        .info-panel { position: fixed; bottom: 15px; left: 195px; color: #444; font-size: 10px; }
    </style>
</head>
<body class="grid-background">

    <div class="toolbar">
        <div style="color: #4a9eff; font-size: 14px; font-weight: bold;">LOGIC BOARD</div>
        
        <div class="toolbar-title">Nody</div>
        <button class="toolbar-btn" onclick="addTile()">+ Nowy Tile</button>
        
        <div class="toolbar-title">Ustawienia</div>
        <button class="toolbar-btn" id="snapBtn" onclick="toggleSnap()">Snap to Grid: ON</button>
        <button class="toolbar-btn" onclick="resetZoom()">Reset Zoom</button>
        
        <div class="toolbar-title">Dane</div>
        <button class="toolbar-btn" onclick="saveProject()">Zapisz JSON</button>
        <button class="toolbar-btn" onclick="triggerLoad()">Wczytaj JSON</button>
        
        <button class="toolbar-btn" style="color:#e74c3c; margin-top: auto;" onclick="clearBoard()">Resetuj wszystko</button>
        <input type="file" id="loadInput" style="display:none" accept=".json">
    </div>

    <div id="canvas-container">
        <div id="canvas">
            <svg id="svg-layer"><g id="lines-group"></g></svg>
            <div id="tiles-layer"></div>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">Nodes: 0 | Connections: 0</div>

    <script src="script.js"></script>
</body>
</html>
