<!doctype html>
<html lang="pl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint Task</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        
        * { font-family: 'JetBrains Mono', monospace; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; overflow: hidden; background: #000000; height: 100%; }
        
        .grid-background {
            background-color: #000000;
            background-image: 
                linear-gradient(#1a1a1a 1px, transparent 1px),
                linear-gradient(90deg, #1a1a1a 1px, transparent 1px),
                linear-gradient(#222222 1px, transparent 1px),
                linear-gradient(90deg, #222222 1px, transparent 1px);
            background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
        }
        
        .tile {
            position: absolute; min-width: 200px; min-height: 100px;
            background: #0d0d0d; border: 1px solid #333; cursor: move;
            user-select: none; box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 10;
        }
        
        .tile-header { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .tile-title { background: transparent; border: none; color: #fff; font-size: 12px; font-weight: 600; flex: 1; outline: none; }
        .tile-content { padding: 10px; }
        .tile-textarea { 
            width: 100%; background: #111; border: 1px solid #2a2a2a; color: #ccc; 
            font-size: 11px; padding: 8px; resize: none; outline: none; min-height: 60px;
        }

        .pin {
            width: 14px; height: 14px; border-radius: 50%; border: 2px solid;
            background: #0d0d0d; cursor: crosshair; position: absolute; z-index: 20;
        }
        .pin-input { left: -8px; top: 40px; }
        .pin-output-container { position: absolute; right: -8px; top: 40px; display: flex; flex-direction: column; gap: 15px; }
        .pin-output { position: relative; width: 14px; height: 14px; border-radius: 50%; border: 2px solid; background: #0d0d0d; }

        .toolbar {
            position: fixed; left: 0; top: 0; width: 200px; height: 100%;
            background: #0a0a0a; border-right: 1px solid #222; padding: 15px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .toolbar-btn {
            background: #151515; border: 1px solid #2a2a2a; color: #aaa;
            padding: 8px 12px; font-size: 11px; cursor: pointer; text-align: left; border-radius: 4px;
        }
        .toolbar-btn:hover { background: #222; color: #fff; }
        
        #canvas-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #canvas { position: absolute; width: 5000px; height: 5000px; transform-origin: 0 0; }
        
        .connection-line { fill: none; stroke-width: 2; pointer-events: stroke; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div style="color: #4a9eff; font-size: 14px; font-weight: bold;">Blueprint Task</div>
        <div style="color: #444; font-size: 9px; margin-bottom: 10px;">v2.1 Managed Save</div>
        
        <button class="toolbar-btn" onclick="addTile()">+ Dodaj Tile</button>
        <hr style="border: 0; border-top: 1px solid #222; margin: 5px 0;">
        
        <button class="toolbar-btn" onclick="saveToTxt()">📄 Pobierz jako .TXT</button>
        <button class="toolbar-btn" onclick="saveProject()">💾 Pobierz Projekt .JSON</button>
        <button class="toolbar-btn" onclick="triggerLoad()">📂 Wczytaj Projekt</button>
        <button class="toolbar-btn" style="color: #e74c3c;" onclick="clearBoard()">⚠ Wyczyść wszystko</button>
        
        <input type="file" id="loadInput" style="display:none" accept=".json">
    </div>

    <div id="canvas-container" class="grid-background">
        <div id="canvas">
            <svg id="connections-svg" style="position:absolute; width:100%; height:100%; pointer-events:none;"></svg>
            <div id="tiles-layer"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
